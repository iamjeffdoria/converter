<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ExportReady</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f0f0f3;
  --surface:   #ffffff;
  --border:    #e5e7eb;
  --border2:   #d1d5db;
  --text:      #111827;
  --muted:     #374151;
  --faint:     #6b7280;
  --fainter:   #9ca3af;
  --purple:    #7c3aed;
  --purple-lt: #ede9fe;
  --purple-dk: #5b21b6;
  --green:     #10b981;
  --red:       #ef4444;
  --red-lt:    #fef2f2;
  --sans:      'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
}

/* ── DESKTOP: 520×520 square ── */
.card {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  width: 520px;
  height: 520px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  animation: fadeUp .3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  background: var(--purple-lt);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--purple);
  flex-shrink: 0;
}

.brand-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.form-mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.form-tag {
  font-size: 11px;
  font-weight: 500;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 5px;
}

.form-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
}

.form-sub {
  font-size: 13px;
  color: var(--faint);
  margin-bottom: 20px;
}

.form { display: flex; flex-direction: column; gap: 12px; }

.field { display: flex; flex-direction: column; gap: 5px; }

.label {
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
}

.input-wrap { position: relative; }

.input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 13px 14px;
  font-size: 16px;
  font-family: var(--sans);
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
  -webkit-appearance: none;
}
.input::placeholder { color: var(--fainter); }
.input:focus {
  border-color: var(--purple);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
}

.pw-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--faint);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  transition: color .15s;
  padding: 4px;
}
.pw-toggle:hover { color: var(--purple); }

.error-msg {
  display: none;
  font-size: 14px;
  color: var(--red);
  background: var(--red-lt);
  border: 1px solid #fecaca;
  border-radius: 9px;
  padding: 11px 14px;
  animation: shake .3s ease;
}
.error-msg.show { display: block; }

@keyframes shake {
  0%,100%{ transform: translateX(0); }
  25%    { transform: translateX(-5px); }
  75%    { transform: translateX(5px); }
}

.btn-submit {
  width: 100%;
  margin-top: 4px;
  padding: 15px 16px;
  background: var(--purple);
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: background .15s, transform .1s, box-shadow .15s;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.btn-submit:hover   { background: var(--purple-dk); box-shadow: 0 4px 16px rgba(124,58,237,0.32); }
.btn-submit:active  { transform: scale(.98); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .5s linear infinite;
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
.btn-submit.loading .btn-text    { opacity: 0; }
.btn-submit.loading .btn-spinner { display: block; }

.form-footer {
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--faint);
}

.green-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s ease infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.version { font-size: 12px; color: var(--fainter); }

/* ── MOBILE: fill entire screen properly ── */
@media (max-width: 580px) {
  html, body {
    padding: 0;
    align-items: stretch;
    background: var(--surface);
  }

  .card {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    border-radius: 0;
    border: none;
    padding: 52px 28px 36px;
    box-shadow: none;
    /* brand top, form center, footer bottom */
    justify-content: space-between;
  }

  .form-mid {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0;
  }

  .form-title  { font-size: 26px; }
  .form-sub    { font-size: 14px; margin-bottom: 24px; }
  .label       { font-size: 15px; }
  .form        { gap: 16px; }
  .field       { gap: 7px; }
  .brand-icon  { width: 42px; height: 42px; font-size: 14px; }
  .brand-name  { font-size: 17px; }
}
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">ER</div>
    <div class="brand-name">ExportReady</div>
  </div>

  <div class="form-mid">
    <div class="form-tag">Analytics Dashboard</div>
    <div class="form-title">Sign in</div>
    <div class="form-sub">Enter your credentials to continue</div>

    <form class="form" id="loginForm" method="POST" action="{% url 'analytics_login' %}">
      {% csrf_token %}

      <div class="field">
        <label class="label" for="username">Username</label>
        <div class="input-wrap">
          <input
            class="input"
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            autocapitalize="none"
            value="{{ request.POST.username }}"
            autofocus
          >
        </div>
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <div class="input-wrap">
          <input
            class="input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            style="padding-right: 60px"
          >
          <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">Show</button>
        </div>
      </div>

      {% if error %}
      <div class="error-msg show" id="errorMsg">{{ error }}</div>
      {% else %}
      <div class="error-msg" id="errorMsg"></div>
      {% endif %}

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign in →</span>
        <span class="btn-spinner"></span>
      </button>

    </form>
  </div>

  <div class="form-footer">
    <div class="status">
      <span class="green-dot"></span>
      Server online
    </div>
    <div class="version">v1.0.0</div>
  </div>

</div>

<script>
const pwInput  = document.getElementById('password');
const pwToggle = document.getElementById('pwToggle');
pwToggle.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type         = show ? 'text' : 'password';
  pwToggle.textContent = show ? 'Hide' : 'Show';
});

const form      = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg  = document.getElementById('errorMsg');

form.addEventListener('submit', (e) => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    e.preventDefault();
    errorMsg.textContent = 'Please fill in both fields.';
    errorMsg.classList.add('show');
    errorMsg.style.animation = 'none';
    errorMsg.offsetHeight;
    errorMsg.style.animation = '';
    return;
  }

  submitBtn.classList.add('loading');
  submitBtn.disabled = true;
});
</script>

</body>
</html>
